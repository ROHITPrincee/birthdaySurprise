<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
}

/* PAGE STRUCTURE */

.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* PAGE 1 BACKGROUND */

#page1{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
background-image:url("bg1.jpg");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
}

/* SHINY RED TITLE */

h1{
font-size:70px;
font-weight:800;
margin-top:200px;
letter-spacing:2px;

/* cleaner romantic red */
color:#e60039;

/* very subtle depth */
text-shadow:
0 2px 4px rgba(0,0,0,0.25),
0 0 6px rgba(255,0,60,0.25);

/* thin outline for clarity */
-webkit-text-stroke:0.4px rgba(120,0,20,0.5);

position:relative;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:300%}
}

h1::after{
content:"✨";
position:absolute;
right:-25px;
top:-10px;
font-size:30px;
animation:twinkle 1.5s infinite alternate;
}

@keyframes twinkle{
0%{opacity:0.3; transform:scale(0.8);}
100%{opacity:1; transform:scale(1.2);}
}

/* BUTTON */

button{
padding:16px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
color:#ff4b6e;
cursor:pointer;
}

button:hover{
animation:shake .4s;
animation-iteration-count:3;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

/* FLOATING HEARTS */

.heart{
position:absolute;
color:#ff4b6e;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0.5); opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh) scale(1.2); opacity:0}
}

/* PAGE 2 */

#page2{
background:black;
display:none;
}

.videoContainer{
display:flex;
align-items:center;
justify-content:center;
gap:50px;
}

video{
width:70%;
border-radius:12px;
}

/* CAKE BUTTON */

.cakeBtn{
display:none;
padding:18px 25px;
font-size:18px;
border:none;
border-radius:15px;
background:linear-gradient(#ffb6c1,#ff6f91);
color:white;
cursor:pointer;
position:relative;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #ff6f91;}
to{box-shadow:0 0 25px #ff1493;}
}

.cakeBtn::before{
content:"🕯️";
position:absolute;
top:-25px;
left:50%;
transform:translateX(-50%);
font-size:22px;
animation:flicker .8s infinite alternate;
}

@keyframes flicker{
0%{transform:translateX(-50%) scale(1);}
100%{transform:translateX(-50%) scale(1.2);}
}

/* PAGE 3 */

#page3{
background:#111;
display:none;
flex-direction:column;
}

/* POLAROID VIEWER */

.viewer{
background:white;
padding:12px 12px 30px 12px;
box-shadow:0 8px 20px rgba(0,0,0,0.6);
width:300px;
margin-top:30px;
}

.viewer img{
width:100%;
}

.navButtons{
margin-top:20px;
}

.finalText{
margin-top:30px;
font-size:40px;
display:none;
color:#ff4d6d;
}

/* SPARKLES */

.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:sparkle 3s infinite;
}

@keyframes sparkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div id="page1" class="page">

<h1>Happy Birthday My Love ❤️</h1>

<button onclick="goPage2()">Explore Me</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page">

<div class="videoContainer">

<video id="birthdayVideo">
<source src="video.mp4" type="video/mp4">
</video>

<button id="nextBtn" class="cakeBtn" onclick="goPage3()">
🎂 Wait wait… one more surprise
</button>

</div>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page">

<h2>Memories Of You ❤️</h2>

<div class="viewer">
<img id="photoViewer">
</div>

<div class="navButtons">
<button onclick="prevPhoto()">Previous</button>
<button onclick="nextPhoto()">Next</button>
</div>

<div class="finalText" id="finalText">
Happiest Birthday To You Once Again ❤️
</div>

<audio id="romanticSong" src="song.mp3" loop></audio>

</div>

<script>

/* PAGE SWITCH */

function goPage2(){

document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="flex";

let vid=document.getElementById("birthdayVideo");

vid.play();

vid.onended=function(){

document.getElementById("nextBtn").style.display="block";

}

}

function goPage3(){

document.getElementById("page2").style.display="none";
document.getElementById("page3").style.display="flex";

document.getElementById("romanticSong").play();

createSparkles();

showPhoto();

}

/* FLOATING HEARTS */

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=5+Math.random()*5+"s";

document.body.appendChild(heart);

}

/* PHOTO VIEWER */

const images=[
"1.jpg","2.jpg","3.jpg","4.jpg","5.jpg",
"6.jpg","7.jpg","8.jpg","9.jpg","10.jpg",
"11.jpg","12.jpg","13.jpg","14.jpg","14.jpg"
];

let index=0;

function showPhoto(){

document.getElementById("photoViewer").src=images[index];

if(index===images.length-1){

document.getElementById("finalText").style.display="block";

}

}

function nextPhoto(){

if(index<images.length-1){

index++;

showPhoto();

}

}

function prevPhoto(){

if(index>0){

index--;

showPhoto();

}

}

/* SPARKLES */

function createSparkles(){

for(let i=0;i<80;i++){

let s=document.createElement("div");

s.className="sparkle";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDelay=Math.random()*3+"s";

document.getElementById("page3").appendChild(s);

}

}

</script>

</body>
</html>
